<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Docs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --blue: #58a6ff;
      --yellow: #d29922;
      --red: #f85149;
      --purple: #bc8cff;
      --orange: #d18616;
      --cyan: #39d2c0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      grid-template-rows: 56px 1fr;
      height: 100vh;
    }

    /* Header */
    .header {
      grid-column: 1 / -1;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
    }

    .header .meta {
      color: var(--text-dim);
      font-size: 13px;
    }

    .search-box {
      margin-left: auto;
      position: relative;
    }

    .search-box input {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px 6px 32px;
      border-radius: 6px;
      font-size: 13px;
      width: 280px;
      outline: none;
    }

    .search-box input:focus {
      border-color: var(--accent);
    }

    .search-box::before {
      content: "\u{1F50D}";
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      opacity: 0.5;
    }

    /* Sidebar */
    .sidebar {
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px 0;
    }

    .sidebar::-webkit-scrollbar { width: 6px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .group-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      padding: 12px 16px 4px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.1s;
    }

    .sidebar-item:hover {
      background: var(--bg-tertiary);
    }

    .sidebar-item.active {
      background: var(--bg-tertiary);
      border-right: 2px solid var(--accent);
    }

    .method-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 3px;
      min-width: 46px;
      text-align: center;
      font-family: monospace;
    }

    .method-GET { background: rgba(63,185,80,0.15); color: var(--green); }
    .method-POST { background: rgba(88,166,255,0.15); color: var(--blue); }
    .method-PUT { background: rgba(210,153,34,0.15); color: var(--yellow); }
    .method-PATCH { background: rgba(188,140,255,0.15); color: var(--purple); }
    .method-DELETE { background: rgba(248,81,73,0.15); color: var(--red); }
    .method-OPTIONS { background: rgba(139,148,158,0.15); color: var(--text-dim); }
    .method-HEAD { background: rgba(139,148,158,0.15); color: var(--text-dim); }

    .sidebar-path {
      font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
      font-size: 12px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Main content */
    .main {
      overflow-y: auto;
      padding: 24px 32px;
    }

    .main::-webkit-scrollbar { width: 6px; }
    .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .welcome {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }

    .welcome h2 {
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .route-detail {
      max-width: 800px;
    }

    .route-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .route-header .method-badge {
      font-size: 14px;
      padding: 4px 12px;
    }

    .route-header .path {
      font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
      font-size: 18px;
      font-weight: 600;
    }

    .route-description {
      color: var(--text-dim);
      margin-bottom: 16px;
      font-size: 14px;
    }

    .route-file {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 24px;
      font-family: monospace;
    }

    .section {
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }

    /* Params table */
    .params-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .params-table th {
      text-align: left;
      padding: 8px 12px;
      background: var(--bg-tertiary);
      color: var(--text-dim);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .params-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    .params-table .param-name {
      font-family: monospace;
      color: var(--cyan);
    }

    .params-table .param-type {
      color: var(--purple);
      font-family: monospace;
      font-size: 12px;
    }

    .params-table .param-required {
      color: var(--red);
      font-size: 11px;
      font-weight: 600;
    }

    .params-table .param-optional {
      color: var(--text-dim);
      font-size: 11px;
    }

    .tag {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      background: rgba(139,148,158,0.15);
      color: var(--text-dim);
      margin-left: 4px;
    }

    .tag.enum {
      background: rgba(188,140,255,0.15);
      color: var(--purple);
    }

    .tag.default {
      background: rgba(63,185,80,0.15);
      color: var(--green);
    }

    /* Code block */
    .code-block {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
      font-size: 13px;
      overflow-x: auto;
      white-space: pre;
      line-height: 1.5;
    }

    /* Try it panel */
    .try-it {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }

    .try-it h4 {
      font-size: 13px;
      margin-bottom: 12px;
      color: var(--accent);
    }

    .try-it label {
      display: block;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 4px;
      margin-top: 8px;
    }

    .try-it input, .try-it textarea, .try-it select {
      width: 100%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 13px;
      font-family: monospace;
      outline: none;
    }

    .try-it input:focus, .try-it textarea:focus {
      border-color: var(--accent);
    }

    .try-it textarea {
      min-height: 100px;
      resize: vertical;
    }

    .try-it-url {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .try-it-url .method-badge {
      flex-shrink: 0;
    }

    .try-it-url input {
      flex: 1;
    }

    .btn {
      display: inline-block;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--accent);
      color: #fff;
      margin-top: 12px;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }

    .response-block {
      margin-top: 12px;
    }

    .response-status {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .response-status.ok { color: var(--green); }
    .response-status.error { color: var(--red); }

    .hidden { display: none; }

    /* Route count badge */
    .count-badge {
      font-size: 10px;
      background: var(--bg-tertiary);
      color: var(--text-dim);
      padding: 1px 6px;
      border-radius: 10px;
      margin-left: 4px;
    }

    @media (max-width: 768px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .sidebar { display: none; }
      .search-box input { width: 160px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <header class="header">
      <h1 id="project-name">API Docs</h1>
      <span class="meta" id="meta-info"></span>
      <div class="search-box">
        <input type="text" id="search" placeholder="Search endpoints... (Ctrl+K)" autocomplete="off">
      </div>
    </header>

    <nav class="sidebar" id="sidebar"></nav>

    <main class="main" id="main">
      <div class="welcome" id="welcome">
        <h2>API Documentation</h2>
        <p>Select an endpoint from the sidebar to view details.</p>
      </div>
      <div class="route-detail hidden" id="route-detail"></div>
    </main>
  </div>

  <script>
    (function() {
      let docs = null;
      let allRoutes = [];
      let activeIdx = -1;

      async function init() {
        try {
          const res = await fetch('/api/docs');
          docs = await res.json();
        } catch(e) {
          document.getElementById('welcome').innerHTML = '<h2>Error</h2><p>Failed to load API docs.</p>';
          return;
        }

        document.getElementById('project-name').textContent = docs.projectName + ' API';
        document.getElementById('meta-info').textContent =
          docs.framework + ' | ' + docs.totalRoutes + ' endpoints | ' + docs.groups.length + ' groups';

        // Flatten routes with group info
        allRoutes = [];
        for (const group of docs.groups) {
          for (const route of group.routes) {
            allRoutes.push({ ...route, groupName: group.name });
          }
        }

        renderSidebar(docs.groups);
        setupSearch();
        setupKeyboard();
      }

      function renderSidebar(groups, filter) {
        const sidebar = document.getElementById('sidebar');
        sidebar.innerHTML = '';

        let idx = 0;
        for (const group of groups) {
          const routes = filter
            ? group.routes.filter(r =>
                r.fullPath.toLowerCase().includes(filter) ||
                r.method.toLowerCase().includes(filter) ||
                (r.description || '').toLowerCase().includes(filter)
              )
            : group.routes;

          if (routes.length === 0) continue;

          const title = document.createElement('div');
          title.className = 'group-title';
          title.innerHTML = group.name + '<span class="count-badge">' + routes.length + '</span>';
          sidebar.appendChild(title);

          for (const route of routes) {
            const globalIdx = allRoutes.findIndex(r => r.fullPath === route.fullPath && r.method === route.method && r.file === route.file);
            const item = document.createElement('div');
            item.className = 'sidebar-item' + (globalIdx === activeIdx ? ' active' : '');
            item.dataset.idx = String(globalIdx);
            item.innerHTML =
              '<span class="method-badge method-' + route.method + '">' + route.method + '</span>' +
              '<span class="sidebar-path">' + escapeHtml(route.fullPath) + '</span>';
            item.addEventListener('click', () => showRoute(globalIdx));
            sidebar.appendChild(item);
          }
        }
      }

      function showRoute(idx) {
        activeIdx = idx;
        const route = allRoutes[idx];
        if (!route) return;

        // Update sidebar active
        document.querySelectorAll('.sidebar-item').forEach(el => {
          el.classList.toggle('active', parseInt(el.dataset.idx) === idx);
        });

        const detail = document.getElementById('route-detail');
        const welcome = document.getElementById('welcome');
        welcome.classList.add('hidden');
        detail.classList.remove('hidden');

        let html = '';

        // Header
        html += '<div class="route-header">';
        html += '<span class="method-badge method-' + route.method + '">' + route.method + '</span>';
        html += '<span class="path">' + escapeHtml(route.fullPath) + '</span>';
        html += '</div>';

        if (route.description) {
          html += '<div class="route-description">' + escapeHtml(route.description) + '</div>';
        }

        html += '<div class="route-file">' + escapeHtml(route.file) + ':' + route.line + '</div>';

        // Parameters
        if (route.params && route.params.length > 0) {
          html += '<div class="section">';
          html += '<div class="section-title">Parameters</div>';
          html += '<table class="params-table"><thead><tr>';
          html += '<th>Name</th><th>Location</th><th>Type</th><th>Required</th><th>Info</th>';
          html += '</tr></thead><tbody>';

          for (const p of route.params) {
            html += '<tr>';
            html += '<td class="param-name">' + escapeHtml(p.name) + '</td>';
            html += '<td>' + p.location + '</td>';
            html += '<td class="param-type">' + escapeHtml(p.type) + '</td>';
            html += '<td class="' + (p.required ? 'param-required' : 'param-optional') + '">' +
                    (p.required ? 'required' : 'optional') + '</td>';
            html += '<td>' + (p.description ? escapeHtml(p.description) : '-') + '</td>';
            html += '</tr>';
          }
          html += '</tbody></table></div>';
        }

        // Body schema
        if (route.bodySchema && route.bodySchema.length > 0) {
          html += '<div class="section">';
          html += '<div class="section-title">Body Schema</div>';
          html += '<table class="params-table"><thead><tr>';
          html += '<th>Field</th><th>Type</th><th>Required</th><th>Details</th>';
          html += '</tr></thead><tbody>';

          for (const f of route.bodySchema) {
            let details = '';
            if (f.enumValues) details += '<span class="tag enum">' + f.enumValues.join(' | ') + '</span> ';
            if (f.constraints) details += f.constraints.join(', ') + ' ';
            if (f.defaultValue) details += '<span class="tag default">default: ' + escapeHtml(f.defaultValue) + '</span>';

            html += '<tr>';
            html += '<td class="param-name">' + escapeHtml(f.name) + '</td>';
            html += '<td class="param-type">' + escapeHtml(f.type) + '</td>';
            html += '<td class="' + (f.required ? 'param-required' : 'param-optional') + '">' +
                    (f.required ? 'required' : 'optional') + '</td>';
            html += '<td>' + (details || '-') + '</td>';
            html += '</tr>';
          }
          html += '</tbody></table></div>';
        }

        // Response example
        if (route.responseExample) {
          html += '<div class="section">';
          html += '<div class="section-title">Response Example</div>';
          html += '<div class="code-block">' + escapeHtml(route.responseExample) + '</div>';
          html += '</div>';
        }

        // Try it panel
        html += '<div class="section">';
        html += '<div class="section-title">Try It</div>';
        html += '<div class="try-it">';
        html += '<h4>Send a request</h4>';

        html += '<label>Base URL</label>';
        html += '<input type="text" id="try-base" value="http://localhost:3001" />';

        html += '<div class="try-it-url">';
        html += '<span class="method-badge method-' + route.method + '">' + route.method + '</span>';
        html += '<input type="text" id="try-path" value="' + escapeHtml(route.fullPath) + '" />';
        html += '</div>';

        if (route.bodySchema && route.bodySchema.length > 0 && ['POST','PUT','PATCH'].includes(route.method)) {
          html += '<label>Request Body (JSON)</label>';
          const bodyObj = {};
          for (const f of route.bodySchema) {
            if (f.defaultValue) bodyObj[f.name] = isNaN(Number(f.defaultValue)) ? f.defaultValue : Number(f.defaultValue);
            else if (f.enumValues && f.enumValues.length > 0) bodyObj[f.name] = f.enumValues[0];
            else if (f.type === 'number') bodyObj[f.name] = 0;
            else if (f.type === 'boolean') bodyObj[f.name] = false;
            else if (f.type.includes('[]')) bodyObj[f.name] = [];
            else bodyObj[f.name] = '';
          }
          html += '<textarea id="try-body">' + escapeHtml(JSON.stringify(bodyObj, null, 2)) + '</textarea>';
        }

        html += '<label>Headers (one per line: Key: Value)</label>';
        html += '<textarea id="try-headers" rows="2">Content-Type: application/json</textarea>';

        html += '<button class="btn" onclick="window.__tryRequest()">Send Request</button>';
        html += '<div id="try-response" class="response-block"></div>';
        html += '</div></div>';

        detail.innerHTML = html;
      }

      window.__tryRequest = async function() {
        const base = document.getElementById('try-base').value.replace(/\/$/, '');
        const path = document.getElementById('try-path').value;
        const route = allRoutes[activeIdx];
        const headersText = document.getElementById('try-headers').value;
        const bodyEl = document.getElementById('try-body');

        const headers = {};
        for (const line of headersText.split('\n')) {
          const idx = line.indexOf(':');
          if (idx > 0) {
            headers[line.slice(0, idx).trim()] = line.slice(idx + 1).trim();
          }
        }

        const opts = { method: route.method, headers };
        if (bodyEl && ['POST','PUT','PATCH'].includes(route.method)) {
          opts.body = bodyEl.value;
        }

        const respDiv = document.getElementById('try-response');
        respDiv.innerHTML = '<div class="response-status" style="color:var(--text-dim)">Sending...</div>';

        try {
          const url = base + path;
          const res = await fetch(url, opts);
          const text = await res.text();
          let formatted = text;
          try { formatted = JSON.stringify(JSON.parse(text), null, 2); } catch {}

          respDiv.innerHTML =
            '<div class="response-status ' + (res.ok ? 'ok' : 'error') + '">' +
            res.status + ' ' + res.statusText + '</div>' +
            '<div class="code-block">' + escapeHtml(formatted) + '</div>';
        } catch(e) {
          respDiv.innerHTML =
            '<div class="response-status error">Request failed</div>' +
            '<div class="code-block">' + escapeHtml(String(e)) + '</div>';
        }
      };

      function setupSearch() {
        const input = document.getElementById('search');
        input.addEventListener('input', () => {
          const q = input.value.toLowerCase().trim();
          renderSidebar(docs.groups, q || null);
        });
      }

      function setupKeyboard() {
        document.addEventListener('keydown', (e) => {
          if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            document.getElementById('search').focus();
          }
        });
      }

      function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      init();
    })();
  </script>
</body>
</html>
